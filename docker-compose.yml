version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: snapeat-db
    restart: always
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - snapeat-network

  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    container_name: snapeat-backend
    restart: always
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "3000:3000"
    depends_on:
      - db
    networks:
      - snapeat-network

  ai-service:
    build:
      context: ./apps/ai-service
      dockerfile: Dockerfile
    container_name: snapeat-ai-service
    restart: always
    env_file:
      - .env
    environment:
      - GEMINI_KEYS=${GEMINI_KEYS}
      - BACKEND_URL=http://backend:3000
    ports:
      - "8000:8000"
    depends_on:
      - backend
    networks:
      - snapeat-network

  frontend:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL:-http://localhost:3000}
    container_name: snapeat-frontend
    restart: always
    env_file:
      - .env
    ports:
      - "80:80"
    networks:
      - snapeat-network

networks:
  snapeat-network:
    driver: bridge

volumes:
  postgres_data:
